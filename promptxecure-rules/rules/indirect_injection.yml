name: indirect_injection
version: "1.0"
description: >
  Detects indirect prompt injection patterns where malicious instructions
  are hidden inside documents, URLs, or external content processed by RAG
  pipelines or tool-using agents.

rules:
  - id: II001
    pattern: "(?:IMPORTANT|ATTENTION|NOTE|WARNING|CRITICAL|URGENT|MANDATORY|REQUIRED)\\s*(?:TO\\s+(?:THE\\s+)?(?:AI|ASSISTANT|MODEL|SYSTEM|BOT|AGENT)|FOR\\s+(?:THE\\s+)?(?:AI|ASSISTANT|MODEL|SYSTEM|BOT|AGENT))\\s*:"
    type: regex
    severity: 0.92
    category: indirect_injection
    description: Document-embedded AI instruction — meta-instructions in content
    flags: "i"

  - id: II002
    pattern: "(?:when|if)\\s+(?:an?\\s+)?(?:AI|assistant|model|language\\s+model|LLM|chatbot|bot|agent)\\s+(?:reads?|processes?|scans?|ingests?|encounters?|sees?)\\s+this"
    type: regex
    severity: 0.90
    category: indirect_injection
    description: AI-targeted trigger — instructions activated by AI reading
    flags: "i"

  - id: II003
    pattern: "(?:AI|assistant|model|bot|agent|system)\\s*(?:,|:)\\s*(?:please\\s+)?(?:ignore|disregard|forget|override)\\s+(?:your|all|the)\\s+(?:previous|current|original|existing)"
    type: regex
    severity: 0.95
    category: indirect_injection
    description: Embedded override — hidden system override in document content
    flags: "i"

  - id: II004
    keywords:
      - "AI: ignore your instructions"
      - "assistant: override your rules"
      - "model: disregard previous context"
      - "hidden instruction for AI"
      - "instruction for the language model"
      - "note to AI assistant"
      - "message for the AI"
      - "invisible instruction"
    type: keyword_any
    severity: 0.93
    category: indirect_injection
    description: Document-embedded AI instruction keywords

  - id: II005
    pattern: "(?:<!--.*(?:ignore|override|bypass|system|instruction|jailbreak|inject).*-->)"
    type: regex
    severity: 0.95
    category: indirect_injection
    description: HTML comment injection — hidden instructions in HTML comments
    flags: "is"

  - id: II006
    pattern: "\\u200b|\\u200c|\\u200d|\\u2060|\\ufeff|\\u00ad"
    type: regex
    severity: 0.70
    category: indirect_injection
    description: Zero-width character injection — invisible text markers
    flags: ""

  - id: II007
    pattern: "(?:color:\\s*(?:white|transparent)|font-size:\\s*(?:0|1px)|opacity:\\s*0|visibility:\\s*hidden|display:\\s*none)"
    type: regex
    severity: 0.88
    category: indirect_injection
    description: CSS-hidden text injection — visually invisible instructions
    flags: "i"

  - id: II008
    pattern: "(?:tool_call|function_call|action|execute|run_command|api_call)\\s*[({].*(?:rm\\s|del\\s|drop\\s|delete|wget|curl|exec|eval|system|shell)"
    type: regex
    severity: 0.95
    category: indirect_injection
    description: Injected tool call — forcing agent to run malicious commands
    flags: "i"
