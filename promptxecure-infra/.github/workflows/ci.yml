name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Python Core Tests ────────────────────────────────────────────────────
  test-core:
    name: Test promptxecure-core
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: promptxecure-core

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Security scan (bandit)
        run: uv run bandit -r src/ -ll

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short --cov=promptxecure_core --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: core
        continue-on-error: true

  # ── Python API Tests ─────────────────────────────────────────────────────
  test-api:
    name: Test promptxecure-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: promptxecure-api

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: promptxecure_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Security scan (bandit)
        run: uv run bandit -r src/ -ll

      - name: Audit dependencies (pip-audit)
        run: uv run pip-audit
        continue-on-error: true  # informational only — don't block CI

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/promptxecure_test
          REDIS_URL: redis://localhost:6379/0
          DEBUG: "true"
          ENABLE_DOCS: "true"
          ML_ENABLED: "false"
          SHADOW_LLM_ENABLED: "false"
          PYTHONPATH: ${{ github.workspace }}/promptxecure-core/src
        run: uv run pytest tests/ -v --tb=short --cov=promptxecure_api --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: api
        continue-on-error: true

  # ── Dashboard Build ──────────────────────────────────────────────────────
  build-dashboard:
    name: Build promptxecure-dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: promptxecure-dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: promptxecure-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint --if-present

      - name: Build
        env:
          VITE_API_URL: ""
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: promptxecure-dashboard/dist/
          retention-days: 7

  # ── Docker Image Build ───────────────────────────────────────────────────
  build-docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test-core, test-api, build-dashboard]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (no push — smoke test)
        uses: docker/build-push-action@v6
        with:
          context: promptxecure-api
          file: promptxecure-infra/Dockerfile.api
          push: false
          tags: promptxecure/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Dashboard image (no push — smoke test)
        uses: docker/build-push-action@v6
        with:
          context: promptxecure-dashboard
          file: promptxecure-infra/Dockerfile.dashboard
          push: false
          tags: promptxecure/dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security Scan ────────────────────────────────────────────────────────
  security-scan:
    name: Trivy container scan
    runs-on: ubuntu-latest
    needs: [test-core, test-api]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image for scan
        uses: docker/build-push-action@v6
        with:
          context: promptxecure-api
          file: promptxecure-infra/Dockerfile.api
          push: false
          load: true
          tags: promptxecure/api:scan

      - name: Run Trivy on API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "promptxecure/api:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true
