# PromptXecure — Production Docker Compose
# Run with: docker compose --env-file .env up -d

name: promptxecure

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-promptxecure}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-promptxecure}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-promptxecure}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    ports:
      - "5432:5432"  # Exposed for local dev API

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-changeme_redis}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    ports:
      - "6379:6379"  # Exposed for local dev API

  # ── Loki (Log Aggregation) ──────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.8
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - internal

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme_grafana}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: http://localhost/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - internal
    ports:
      - "3002:3000"  # Direct access: http://localhost:3002

  # ── Langfuse ─────────────────────────────────────────────────────────────────
  langfuse:
    image: langfuse/langfuse:2
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-promptxecure}:${POSTGRES_PASSWORD:-changeme_in_production}@postgres:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-changeme_langfuse_secret_32chars}
      NEXTAUTH_URL: http://localhost/langfuse
      LANGFUSE_INIT_ORG_ID: promptxecure
      LANGFUSE_INIT_ORG_NAME: PromptXecure
      LANGFUSE_INIT_PROJECT_ID: promptxecure-project
      LANGFUSE_INIT_PROJECT_NAME: PromptXecure
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-changeme}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-changeme}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_ADMIN_EMAIL:-admin@admin.com}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_ADMIN_PASSWORD:-Admin2026!}
      LANGFUSE_INIT_USER_NAME: Admin
      SALT: ${LANGFUSE_SALT:-changeme_salt_min16chars0}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/public/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - internal
    ports:
      - "3000:3000"  # Direct access: http://localhost:3000

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: promptxecure-infra/Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-promptxecure}:${POSTGRES_PASSWORD:-changeme_in_production}@postgres:5432/${POSTGRES_DB:-promptxecure}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis}@redis:6379/0
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: http://langfuse:3000
      NVIDIA_NIM_API_KEY: ${NVIDIA_NIM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      LITELLM_DEFAULT_MODEL: ${LITELLM_DEFAULT_MODEL:-nvidia_nim/meta/llama-3.1-8b-instruct}
      RULES_PATH: /app/promptxecure-rules/rules/
      ML_MODEL_PATH: /app/promptxecure-core/data/model/
      HF_HOME: /app/hf_cache
      RISK_THRESHOLD_SUSPICIOUS: ${RISK_THRESHOLD_SUSPICIOUS:-0.3}
      RISK_THRESHOLD_MALICIOUS: ${RISK_THRESHOLD_MALICIOUS:-0.7}
      ML_ENABLED: ${ML_ENABLED:-true}
      SHADOW_LLM_ENABLED: ${SHADOW_LLM_ENABLED:-false}
      OUTPUT_VALIDATION_ENABLED: ${OUTPUT_VALIDATION_ENABLED:-true}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      ENABLE_DOCS: ${ENABLE_DOCS:-true}
      CORS_ORIGINS: http://localhost,http://localhost:80,${CORS_ORIGINS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - internal
    volumes:
      # Mount rules and model for hot-reloading
      - ../promptxecure-rules:/app/promptxecure-rules:ro
      - ../promptxecure-core/data:/app/promptxecure-core/data:ro

  # ── React Dashboard (built static files served by Nginx) ────────────────────
  dashboard:
    build:
      context: ../promptxecure-dashboard
      dockerfile: ../promptxecure-infra/Dockerfile.dashboard
    restart: unless-stopped
    networks:
      - internal
    # Not exposed directly — served via nginx

  # ── Nginx (Public Entrypoint) ────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # TLS certs (optional — mount your own certs)
      # - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "nginx -t 2>/dev/null && wget -q --spider http://localhost/nginx-health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - internal

  # ── Promtail (Docker Log Shipper → Loki) ────────────────────────────────────
  promtail:
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  loki_data:
  grafana_data:

networks:
  internal:
    driver: bridge
